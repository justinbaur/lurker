<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LURKER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  color: #fff;
  touch-action: none; -webkit-user-select: none; user-select: none;
  padding-bottom: env(safe-area-inset-bottom);
}
canvas { display: block; cursor: crosshair; touch-action: none; }
#ui {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#sanity-label { font-size: 10px; color: #800; letter-spacing: 3px; margin-bottom: 4px; }
#health-bar { width: 140px; height: 10px; border: 1px solid #600; background: #111; }
#health-fill { height: 100%; background: linear-gradient(90deg, #900, #f33); transition: width 0.3s; }
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; z-index: 20;
}
#overlay h1 {
  font-size: 4em; letter-spacing: 0.3em; color: #900;
  text-shadow: 0 0 40px #f00, 0 0 80px #600;
  margin-bottom: 16px;
}
#overlay .sub { color: #555; font-size: 0.85em; letter-spacing: 3px; margin: 6px 0; }
#overlay .hint { color: #333; font-size: 0.7em; letter-spacing: 2px; margin-top: 24px; }
#overlay button {
  margin-top: 36px; padding: 12px 44px;
  background: transparent; border: 1px solid #800;
  color: #f00; font-family: 'Courier New', monospace;
  font-size: 0.95em; letter-spacing: 4px; cursor: pointer;
  text-transform: uppercase; transition: all 0.3s;
}
#overlay button:hover { background: #1a0000; box-shadow: 0 0 20px #f00; }
#flash {
  position: fixed; inset: 0; background: #f00;
  opacity: 0; pointer-events: none; z-index: 15;
  transition: opacity 0.05s;
}
#portrait-warn {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #800;
  font-size: 1.1em;
  letter-spacing: 2px;
  text-align: center;
  padding: 24px;
}
@media (orientation: portrait) {
  #portrait-warn { display: flex; }
}
</style>
</head>
<body>

<div id="ui">
  <div id="level-label" style="font-size:10px;color:#555;letter-spacing:3px">LEVEL 1</div>
  <div>
    <div id="sanity-label">SANITY</div>
    <div id="health-bar"><div id="health-fill"></div></div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="flash"></div>
<div id="portrait-warn">
  <p>ROTATE YOUR DEVICE</p>
  <p style="color:#444;font-size:0.7em;margin-top:16px">LANDSCAPE MODE REQUIRED</p>
</div>

<div id="overlay">
  <h1>LURKER</h1>
  <p class="sub">They only move when you can't see them.</p>
  <p class="sub">Find the exit. Don't look away.</p>
  <p class="hint">WASD / Arrows &nbsp;|&nbsp; Mouse to aim flashlight</p>
  <p class="hint">MOBILE: Left stick to move &nbsp;|&nbsp; Right stick to aim</p>
  <button id="startBtn">ENTER THE DARK</button>
</div>

<script type="module" src="src/game.js"></script>
</body>
</html>
